name: scrape

# Top of every hour. GitHub Actions cron is best-effort — runs may slip by
# 5-15 minutes under platform load, which is fine for a stock aggregator.
# workflow_dispatch lets you trigger a refresh manually from the Actions tab.
on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch: {}

# Don't pile up runs if one is still going.
concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
        with:
          # Need a real token (not GITHUB_TOKEN's default) to push back, OR
          # set permissions: contents: write above. We've done the latter.
          persist-credentials: true

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install
        run: pip install -e .

      - name: Refresh ThrustCurve catalog
        # Always run this — the SQLite DB is gitignored so each runner starts
        # empty, and we need motors loaded before scrape→match can succeed.
        # ``actions/checkout`` resets file mtimes to "now," so an mtime-based
        # "skip if fresh" check never triggered and silently produced
        # snapshots where every listing was unmatched. The refresh itself is
        # a single HTTP request (~2s, 273 records) — cheap to always run.
        run: hpr catalog refresh

      - name: Scrape all vendors
        run: hpr scrape run all

      - name: Sanity-check per-vendor listing counts
        # Catch the case where a vendor returns suspiciously few listings
        # (Shopify rate-limiting from data center IPs, transient 5xx, etc.).
        # If any vendor's count is under the floor we know is achievable on a
        # healthy run, fail loudly instead of silently committing bad data.
        working-directory: ${{ github.workspace }}
        run: |
          python3 - <<'PY'
          import sqlite3, sys
          # Floors are well below the typical healthy run, but well above the
          # "scraper got rate-limited mid-walk and bailed early" floor we've
          # observed (~20% of normal).
          MIN_BY_VENDOR = {
              "csrocketry": 200,
              "buyrocketmotors": 200,
              "wildman": 200,
              "amw": 200,
              "sirius": 200,
          }
          conn = sqlite3.connect("data/hpr.db")
          rows = conn.execute(
              "SELECT v.slug, COUNT(*) FROM listings l JOIN vendors v ON v.id=l.vendor_id GROUP BY v.slug"
          ).fetchall()
          counts = dict(rows)
          bad = []
          for slug, floor in MIN_BY_VENDOR.items():
              got = counts.get(slug, 0)
              status = "OK" if got >= floor else "LOW"
              print(f"  {slug:20s} {got:4d}  (floor {floor}) {status}")
              if got < floor:
                  bad.append((slug, got, floor))
          if bad:
              print()
              print("Refusing to commit snapshot — these vendors are below the sanity floor:")
              for slug, got, floor in bad:
                  print(f"  {slug}: {got} < {floor}")
              sys.exit(1)
          PY

      - name: Export snapshot
        run: hpr snapshot export

      - name: Commit changes if any
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/snapshot.json data/thrustcurve_aerotech.json
          # No-op when scrape produced no changes (e.g. all vendors quiet).
          # [skip ci] keeps the regular test workflow from running on these
          # data-only commits — saves Actions minutes and avoids noise.
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "Hourly scrape: refresh snapshot [skip ci]"
            git push
          fi
